---
- name: Converge cloud image syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cloud_image_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.cloud_image for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.cloud_image
      when: cloud_image_molecule_execute_role | bool

    - name: Record lit.rhel.cloud_image Molecule coverage mode
      ansible.builtin.set_fact:
        cloud_image_molecule_coverage_mode: syntax_stub
