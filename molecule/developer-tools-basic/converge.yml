---
- name: Converge developer tools syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    developer_tools_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.developer_tools for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.developer_tools
      when: developer_tools_molecule_execute_role | bool

    - name: Record lit.rhel.developer_tools Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-developer_tools-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
