---
- name: Converge firefox syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.firefox for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.firefox
      when: firefox_molecule_execute_role | bool

    - name: Record lit.rhel.firefox Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-firefox-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
