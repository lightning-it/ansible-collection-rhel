---
- name: Verify firefox syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read lit.rhel.firefox coverage marker
      ansible.builtin.slurp:
        src: /tmp/lit-rhel-firefox-molecule-coverage
      register: firefox_molecule_coverage_marker

    - name: Assert lit.rhel.firefox coverage stub ran
      ansible.builtin.assert:
        that:
          - (firefox_molecule_coverage_marker.content | b64decode | trim) == "syntax_stub"
        quiet: true
