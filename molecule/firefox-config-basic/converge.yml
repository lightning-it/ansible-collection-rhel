---
- name: Converge firefox config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_config_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.firefox_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.firefox_config
      when: firefox_config_molecule_execute_role | bool

    - name: Record lit.rhel.firefox_config Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-firefox_config-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
