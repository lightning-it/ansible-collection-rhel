---
- name: Converge firefox destroy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_destroy_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.firefox_destroy for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.firefox_destroy
      when: firefox_destroy_molecule_execute_role | bool

    - name: Record lit.rhel.firefox_destroy Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-firefox_destroy-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
