---
- name: Converge gui syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gui_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.gui for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.gui
      when: gui_molecule_execute_role | bool

    - name: Record lit.rhel.gui Molecule coverage mode
      ansible.builtin.set_fact:
        gui_molecule_coverage_mode: syntax_stub
