---
- name: Verify selinux syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read lit.rhel.selinux coverage marker
      ansible.builtin.slurp:
        src: /tmp/lit-rhel-selinux-molecule-coverage
      register: selinux_molecule_coverage_marker

    - name: Assert lit.rhel.selinux coverage stub ran
      ansible.builtin.assert:
        that:
          - (selinux_molecule_coverage_marker.content | b64decode | trim) == "syntax_stub"
        quiet: true
