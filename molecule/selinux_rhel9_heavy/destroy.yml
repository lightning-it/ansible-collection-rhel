---
- name: Destroy RHEL 9 Incus target for SELinux heavy test
  hosts: localhost
  gather_facts: false
  vars:
    selinux_molecule_project_directory: >-
      {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir ~ '/../..', true) }}
    selinux_molecule_instance_config: "{{ lookup('env', 'MOLECULE_INSTANCE_CONFIG') }}"
    selinux_molecule_name_file: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/incus-instance-name"
  tasks:
    - name: Read Molecule instance config
      ansible.builtin.set_fact:
        selinux_molecule_instances: "{{ lookup('file', selinux_molecule_instance_config) | from_yaml }}"
      when: selinux_molecule_instance_config | length > 0 and selinux_molecule_instance_config is file

    - name: Read fallback SELinux Incus target name
      ansible.builtin.set_fact:
        selinux_molecule_fallback_instance_name: >-
          {{ lookup('env', 'INCUS_INSTANCE_NAME') | default(lookup('file', selinux_molecule_name_file), true) }}
      when: selinux_molecule_name_file is file or lookup('env', 'INCUS_INSTANCE_NAME') | length > 0

    - name: Destroy configured SELinux Incus targets
      ansible.builtin.command:
        argv:
          - "{{ selinux_molecule_project_directory }}/deploy/incus/scripts/destroy.sh"
          - --name
          - "{{ item.instance }}"
      loop: "{{ selinux_molecule_instances | default([]) }}"
      changed_when: true

    - name: Destroy fallback SELinux Incus target
      ansible.builtin.command:
        argv:
          - "{{ selinux_molecule_project_directory }}/deploy/incus/scripts/destroy.sh"
          - --name
          - "{{ selinux_molecule_fallback_instance_name }}"
      changed_when: true
      when:
        - (selinux_molecule_instances | default([]) | length) == 0
        - selinux_molecule_fallback_instance_name | default('', true) | length > 0

    - name: Remove Molecule instance config
      ansible.builtin.file:
        path: "{{ selinux_molecule_instance_config }}"
        state: absent
      when: selinux_molecule_instance_config | length > 0

    - name: Remove fallback SELinux Incus target name file
      ansible.builtin.file:
        path: "{{ selinux_molecule_name_file }}"
        state: absent
