---
- name: Verify virtual guest syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read lit.rhel.virtual_guest coverage marker
      ansible.builtin.slurp:
        src: /tmp/lit-rhel-virtual_guest-molecule-coverage
      register: virtual_guest_molecule_coverage_marker

    - name: Assert lit.rhel.virtual_guest coverage stub ran
      ansible.builtin.assert:
        that:
          - (virtual_guest_molecule_coverage_marker.content | b64decode | trim) == "syntax_stub"
        quiet: true
