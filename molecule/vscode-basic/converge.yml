---
- name: Converge vscode syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.vscode for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.vscode
      when: vscode_molecule_execute_role | bool

    - name: Record lit.rhel.vscode Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-vscode-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
