---
- name: Verify vscode syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read lit.rhel.vscode coverage marker
      ansible.builtin.slurp:
        src: /tmp/lit-rhel-vscode-molecule-coverage
      register: vscode_molecule_coverage_marker

    - name: Assert lit.rhel.vscode coverage stub ran
      ansible.builtin.assert:
        that:
          - (vscode_molecule_coverage_marker.content | b64decode | trim) == "syntax_stub"
        quiet: true
