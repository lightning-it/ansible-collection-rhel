---
- name: Verify vscode config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Read lit.rhel.vscode_config coverage marker
      ansible.builtin.slurp:
        src: /tmp/lit-rhel-vscode_config-molecule-coverage
      register: vscode_config_molecule_coverage_marker

    - name: Assert lit.rhel.vscode_config coverage stub ran
      ansible.builtin.assert:
        that:
          - (vscode_config_molecule_coverage_marker.content | b64decode | trim) == "syntax_stub"
        quiet: true
