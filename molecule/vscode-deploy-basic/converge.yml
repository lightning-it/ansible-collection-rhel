---
- name: Converge vscode deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.vscode_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.vscode_deploy
      when: vscode_deploy_molecule_execute_role | bool

    - name: Record lit.rhel.vscode_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        vscode_deploy_molecule_coverage_mode: syntax_stub
