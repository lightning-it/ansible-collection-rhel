---
- name: Converge vscode deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.vscode_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.vscode_deploy
      when: vscode_deploy_molecule_execute_role | bool

    - name: Record lit.rhel.vscode_deploy Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-vscode_deploy-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
