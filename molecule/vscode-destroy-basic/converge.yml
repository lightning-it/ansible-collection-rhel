---
- name: Converge vscode destroy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_destroy_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.vscode_destroy for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.vscode_destroy
      when: vscode_destroy_molecule_execute_role | bool

    - name: Record lit.rhel.vscode_destroy Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-vscode_destroy-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
