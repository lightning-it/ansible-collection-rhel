---
- name: Converge xrdp syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    xrdp_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.xrdp for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.xrdp
      when: xrdp_molecule_execute_role | bool

    - name: Record lit.rhel.xrdp Molecule coverage mode
      ansible.builtin.set_fact:
        xrdp_molecule_coverage_mode: syntax_stub
