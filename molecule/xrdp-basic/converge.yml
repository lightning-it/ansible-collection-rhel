---
- name: Converge xrdp syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    xrdp_molecule_execute_role: false
  tasks:
    - name: Import lit.rhel.xrdp for syntax coverage
      ansible.builtin.import_role:
        name: lit.rhel.xrdp
      when: xrdp_molecule_execute_role | bool

    - name: Record lit.rhel.xrdp Molecule coverage marker
      ansible.builtin.copy:
        dest: /tmp/lit-rhel-xrdp-molecule-coverage
        content: "syntax_stub\n"
        mode: "0644"
