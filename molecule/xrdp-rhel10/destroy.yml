---
- name: Destroy RHEL 10 Incus VM for xrdp
  hosts: localhost
  gather_facts: false
  vars:
    xrdp_molecule_project_directory: >-
      {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir ~ '/../..', true) }}
    xrdp_molecule_instance_config: "{{ lookup('env', 'MOLECULE_INSTANCE_CONFIG') }}"
    xrdp_molecule_name_file: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/incus-instance-name"
  tasks:
    - name: Read Molecule instance config
      ansible.builtin.set_fact:
        xrdp_molecule_instances: "{{ lookup('file', xrdp_molecule_instance_config) | from_yaml }}"
      when: xrdp_molecule_instance_config | length > 0 and xrdp_molecule_instance_config is file

    - name: Read fallback xrdp Incus VM name
      ansible.builtin.set_fact:
        xrdp_molecule_fallback_instance_name: >-
          {{ lookup('env', 'INCUS_INSTANCE_NAME') | default(lookup('file', xrdp_molecule_name_file), true) }}
      when: xrdp_molecule_name_file is file or lookup('env', 'INCUS_INSTANCE_NAME') | length > 0

    - name: Destroy configured xrdp Incus VMs
      ansible.builtin.command:
        argv:
          - "{{ xrdp_molecule_project_directory }}/deploy/incus/scripts/destroy.sh"
          - --name
          - "{{ item.instance }}"
      loop: "{{ xrdp_molecule_instances | default([]) }}"
      changed_when: true

    - name: Destroy fallback xrdp Incus VM
      ansible.builtin.command:
        argv:
          - "{{ xrdp_molecule_project_directory }}/deploy/incus/scripts/destroy.sh"
          - --name
          - "{{ xrdp_molecule_fallback_instance_name }}"
      changed_when: true
      when:
        - (xrdp_molecule_instances | default([]) | length) == 0
        - xrdp_molecule_fallback_instance_name | default('', true) | length > 0

    - name: Remove Molecule instance config
      ansible.builtin.file:
        path: "{{ xrdp_molecule_instance_config }}"
        state: absent
      when: xrdp_molecule_instance_config | length > 0

    - name: Remove fallback xrdp Incus VM name file
      ansible.builtin.file:
        path: "{{ xrdp_molecule_name_file }}"
        state: absent
