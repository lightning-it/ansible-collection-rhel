---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Install podman toolchain
  ansible.builtin.package:
    name: "{{ podman_packages }}"
    state: present
  when:
    - podman_package_manage | bool
    - podman_packages | length > 0

- name: Ensure registries.conf directory exists
  ansible.builtin.file:
    path: "{{ podman_registries_conf_dir }}"
    state: directory
    mode: "0755"

- name: Configure rootless podman storage
  ansible.builtin.import_tasks: rootless_storage.yml
  when: podman_rootless_storage_manage | bool
