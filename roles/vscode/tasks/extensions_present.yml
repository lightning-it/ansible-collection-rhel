---
- name: Ensure VS Code user directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ vscode_user }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ _vscode_user_data_dir_effective }}"
      group: "{{ _vscode_user_gid_effective | default(vscode_user, true) }}"
      mode: "0755"
    - path: "{{ _vscode_extensions_dir_effective }}"
      group: "{{ _vscode_user_gid_effective | default(vscode_user, true) }}"
      mode: "0755"
    - path: "{{ _vscode_vsix_tmp_dir_effective }}"
      group: "{{ _vscode_user_gid_effective | default(vscode_user, true) }}"
      mode: "0755"
  loop_control:
    label: "{{ item.path }}"

- name: Query installed VS Code extensions
  ansible.builtin.command:
    argv:
      - "{{ _vscode_code_path }}"
      - --list-extensions
      - --user-data-dir
      - "{{ _vscode_user_data_dir_effective }}"
      - --extensions-dir
      - "{{ _vscode_extensions_dir_effective }}"
  become: true
  become_user: "{{ vscode_user }}"
  environment:
    HOME: "{{ _vscode_user_home_effective }}"
    USER: "{{ vscode_user }}"
  register: _vscode_installed_extensions_cmd
  changed_when: false

- name: Set installed VS Code extensions fact
  ansible.builtin.set_fact:
    _vscode_installed_extensions: >-
      {{
        _vscode_installed_extensions_cmd.stdout_lines
        | default([])
        | map('trim')
        | map('lower')
        | list
      }}
  changed_when: false

- name: Install missing VS Code extensions
  ansible.builtin.command:
    argv:
      - "{{ _vscode_code_path }}"
      - --install-extension
      - "{{ item }}"
      - --user-data-dir
      - "{{ _vscode_user_data_dir_effective }}"
      - --extensions-dir
      - "{{ _vscode_extensions_dir_effective }}"
  become: true
  become_user: "{{ vscode_user }}"
  environment:
    HOME: "{{ _vscode_user_home_effective }}"
    USER: "{{ vscode_user }}"
  loop: "{{ _vscode_extensions_effective }}"
  loop_control:
    label: "{{ item }}"
  when: item | lower not in _vscode_installed_extensions

- name: Copy local VSIX files to managed host
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ _vscode_vsix_tmp_dir_effective }}/{{ item.path | basename }}"
    owner: "{{ vscode_user }}"
    group: "{{ _vscode_user_gid_effective | default(vscode_user, true) }}"
    mode: "0644"
  loop: "{{ vscode_vsix_files }}"
  loop_control:
    label: "{{ item.id }}"
  when: item.id | lower not in _vscode_installed_extensions

- name: Install missing VSIX extensions
  ansible.builtin.command:
    argv:
      - "{{ _vscode_code_path }}"
      - --install-extension
      - "{{ _vscode_vsix_tmp_dir_effective }}/{{ item.path | basename }}"
      - --user-data-dir
      - "{{ _vscode_user_data_dir_effective }}"
      - --extensions-dir
      - "{{ _vscode_extensions_dir_effective }}"
  become: true
  become_user: "{{ vscode_user }}"
  environment:
    HOME: "{{ _vscode_user_home_effective }}"
    USER: "{{ vscode_user }}"
  loop: "{{ vscode_vsix_files }}"
  loop_control:
    label: "{{ item.id }}"
  when: item.id | lower not in _vscode_installed_extensions
