---
- name: Skip when disabled
  ansible.builtin.meta: end_host
  when: not (vscode_config_enabled | bool)

- name: Load shared VS Code state
  ansible.builtin.include_role:
    name: lit.rhel.vscode
    tasks_from: main.yml
    public: true

- name: Ensure VS Code config inputs are valid
  ansible.builtin.assert:
    that:
      - vscode_user | trim | length > 0
      - _vscode_user_home_effective | trim | length > 0
      - _vscode_code_path | trim | length > 0
    fail_msg: >-
      lit.rhel.vscode_config requires vscode_user, a resolvable user home, and
      an installed code CLI. Run lit.rhel.vscode_deploy first.
  changed_when: false

- name: Ensure requested VS Code extensions are present
  ansible.builtin.include_role:
    name: lit.rhel.vscode
    tasks_from: extensions_present.yml
  when:
    - (_vscode_extensions_effective | default([], true) | length) > 0
      or (vscode_vsix_files | default([], true) | length) > 0

- name: Ensure VS Code user settings are managed
  ansible.builtin.include_role:
    name: lit.rhel.vscode
    tasks_from: user_settings.yml
  when: vscode_manage_user_settings | bool
